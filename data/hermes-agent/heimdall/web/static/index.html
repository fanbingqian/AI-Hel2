async function renderGraph(entityId = '') {
  const container = document.getElementById('graph-container');
  if (!container) return;
  container.innerHTML = '<div class="empty-state"><div class="empty-icon">:-)</div><p>正在构建知识图谱...</p></div>';

  try {
    let nodes = [], edges = [];
    const nodeMap = {};

    state.entities.slice(0, 50).forEach(e => {
      const n = entityToNode(e);
      nodes.push(n);
      nodeMap[e.entity_id] = true;
    });

    const topEntities = state.entities.slice(0, 10);
    for (const e of topEntities) {
      try {
        const resp = await fetch(API+'/api/entities/'+e.entity_id+'/graph').then(r=>r.json());
        resp.nodes.forEach(n => {
          if (!nodeMap[n.id]) { nodes.push(n); nodeMap[n.id] = true; }
        });
        edges.push(...resp.edges);
      } catch (err) {}
    }

    container.innerHTML = '';

    const W = container.clientWidth || 700;
    const H = container.clientHeight || 500;
    const cx = W / 2, cy = H / 2;

    const centerNode = entityId ? nodes.find(n => n.id === entityId) : null;
    const primaryNodes = nodes.filter(n => n.id !== entityId && !n.id.startsWith('k_'));
    const knowledgeNodes = nodes.filter(n => n.id.startsWith('k_'));

    const innerRing = primaryNodes.slice(0, 16);
    const outerRing = primaryNodes.slice(16);

    if (centerNode) {
      centerNode.x = cx;
      centerNode.y = cy;
      centerNode.fixed = { x: true, y: true };
    }

    const innerR = Math.min(W, H) * 0.14;
    innerRing.forEach((n, i) => {
      const angle = (2 * Math.PI * i) / innerRing.length - Math.PI / 2;
      n.x = cx + innerR * Math.cos(angle);
      n.y = cy + innerR * Math.sin(angle);
    });

    const outerR = Math.min(W, H) * 0.21;
    outerRing.forEach((n, i) => {
      const angle = (2 * Math.PI * i) / Math.max(outerRing.length, 1) - Math.PI / 2;
      n.x = cx + outerR * Math.cos(angle);
      n.y = cy + outerR * Math.sin(angle);
    });

    knowledgeNodes.forEach((n, i) => {
      const kr = Math.min(W, H) * (0.18 + 0.04 * Math.random());
      const angle = (2 * Math.PI * i) / Math.max(knowledgeNodes.length, 1) - Math.PI / 2;
      n.x = cx + kr * Math.cos(angle);
      n.y = cy + kr * Math.sin(angle);
    });

    const legend = document.createElement('div');
    legend.className = 'graph-legend';
    legend.innerHTML = `<b>图例</b>
      <div class="legend-row"><span class="legend-node" style="background:#e07a5f"></span> 人物</div>
      <div class="legend-row"><span class="legend-node" style="background:#667bc0"></span> 项目</div>
      <div class="legend-row"><span class="legend-node" style="background:#b08abb"></span> 技能</div>
      <div class="legend-row"><span class="legend-node" style="background:#d4a76a"></span> 概念</div>
      <div class="legend-row"><span class="legend-node square" style="background:#3b82f6"></span> 知识条目</div>
      <div class="legend-row"><span class="legend-node diamond" style="background:#ec4899;width:8px;height:8px"></span> 桥接节点</div>
      <div class="legend-row" style="margin-top:4px"><span class="legend-line"></span> 社交边（实线）</div>
      <div class="legend-row"><span class="legend-line dashed"></span> 知识边（虚线）</div>
      <div class="legend-row"><span class="legend-line dotted"></span> 记忆边（点线）</div>
      <div class="legend-row" style="margin-top:4px;font-size:10px;color:var(--text-muted)">环形分布 | 社区检测后按社区着色</div>`;
    container.appendChild(legend);

    const visNodes = new vis.DataSet(nodes);
    const visEdges = new vis.DataSet(edges);

    const memEdges = edges.filter(e => e.edge_type === 'memory').length;
    const socEdges = edges.filter(e => e.edge_type === 'social').length;
    const kwEdges = edges.filter(e => e.edge_type === 'knowledge').length;
    const edgeInfo = memEdges + socEdges + kwEdges > 0
      ? ` | ${socEdges}条社交 · ${memEdges}条记忆 · ${kwEdges}条知识`
      : ' | 暂无关系边 — 发送消息后提取实体关系';

    const infoEl = document.createElement('div');
    infoEl.style.cssText = 'position:absolute;top:4px;right:8px;font-size:10px;color:var(--text-muted);z-index:5;';
    infoEl.textContent = `${nodes.length}个节点${edgeInfo}`;
    container.appendChild(infoEl);

    const network = new vis.Network(container, { nodes: visNodes, edges: visEdges }, {
      nodes: { shape: 'dot', size: 12, font: { size: 11, color: '#ffffff', strokeWidth: 0, face: 'sans-serif' }, scaling: { label: { enabled: false } } },
      edges: {
        smooth: { type: 'continuous', roundness: 0.5 },
        width: 0.05,
        scaling: { min: 0.3, max: 1 },
        dashes: false,
        color: { opacity: 0.4 },
        font: { size: 11, color: '#ffffff', strokeWidth: 0, face: 'sans-serif', align: 'middle' },
      },
      physics: {
        solver: 'forceAtlas2Based',
        forceAtlas2Based: {
          gravitationalConstant: -30,
          centralGravity: 0.008,
          springLength: 100,
          springConstant: 0.03,
          damping: 0.5,
        },
        minVelocity: 0.25,
        maxVelocity: 10,
        stabilization: { iterations: 150, fit: false },
      },
      interaction: { hover: true, tooltipDelay: 100 },
    });

    network.on('doubleClick', (params) => {
      if (params.nodes.length > 0) {
        const nid = params.nodes[0];
        if (nid && !String(nid).startsWith('k_')) {
          showEntityDetail(nid);
        }
      }
    });

  } catch (e) { console.error(e); }
}

function entityToNode(e) {
  const colors = {
    person:       { background: '#e07a5f', border: '#c0624a', highlight: { background: '#f08a6f', border: '#d0725a' } },
    organization: { background: '#5e8c7e', border: '#4a7265', highlight: { background: '#6e9c8e', border: '#5a8275' } },
    project:      { background: '#667bc0', border: '#5065a8', highlight: { background: '#768bd0', border: '#6075b8' } },
    tool:         { background: '#7d9f6e', border: '#658556', highlight: { background: '#8daf7e', border: '#759566' } },
    concept:      { background: '#d4a76a', border: '#bc8f52', highlight: { background: '#e4b77a', border: '#cc9f62' } },
    skill:        { background: '#b08abb', border: '#9670a3', highlight: { background: '#c09acb', border: '#a680b3' } },
    event:        { background: '#6dacb5', border: '#55909a', highlight: { background: '#7dbcc5', border: '#65a0aa' } },
    location:     { background: '#d4956b', border: '#bc7d53', highlight: { background: '#e4a57b', border: '#cc8d63' } },
    media:        { background: '#a089b5', border: '#86709d', highlight: { background: '#b099c5', border: '#9680ad' } },
  };
  const communityPalette = [
    '#667bc0', '#b08abb', '#e07a5f', '#d4956b', '#5e8c7e',
    '#d4a76a', '#6dacb5', '#7d9f6e', '#c47e8b', '#6b9eac',
    '#c0a060', '#9b7eb8',
  ];

  const etype = e.entity_type || 'concept';
  const palette = colors[etype] || { background: '#a09988', border: '#888070', highlight: { background: '#b0a998', border: '#989080' } };
  let node = {
    id: e.entity_id,
    label: (e.display_name||'?').substring(0, 15),
    group: etype,
    color: palette,
    title: `${e.display_name||'?'}\ntype: ${etype}\nseen: ${e.occurrence_count||0}x`,
  };
  const cid = e.community_id;
  if (cid !== null && cid !== undefined && cid >= 0) {
    const bg = communityPalette[cid % communityPalette.length];
    node.color = { background: bg, border: bg, highlight: { background: bg, border: bg } };
    if (e.community_label) {
      node.title += `\ncommunity: ${e.community_label}`;
    }
  }
  if (e.is_bridge) {
    node.shape = 'diamond';
    node.borderWidth = 3;
    node.color = node.color || {};
    node.color.border = '#ec4899';
  }
  if (e.shape) node.shape = e.shape;
  if (e.borderWidth) node.borderWidth = e.borderWidth;
  if (typeof e.color === 'object' && e.color.background) node.color = e.color;
  return node;
}

async function showEntityDetail(id) {
  const panel = document.getElementById('detail-panel');
  if (!panel) return;
  try {
    const resp = await fetch(API+'/api/entities/'+id).then(r=>r.json());
    const e = resp.entity;
    const conns = resp.connections || [];
    let html = `<button class="close-btn" onclick="this.parentElement.classList.remove('open')">x</button>
      <h3>${esc(e.display_name||'?')}</h3>
      <p style="color:var(--text-muted)">type: ${e.entity_type} | seen: ${e.occurrence_count||0}x | confidence: ${((e.confidence||0)*100).toFixed(0)}%</p>`;
    html += `<p style="color:var(--text-muted);font-size:11px">
      PageRank: ${(e.pagerank||1).toFixed(3)}
      ${e.pagerank_error>0.2?'<span style="color:#e74c3c" title="误差超阈值，需云端同步"> 误差:'+e.pagerank_error.toFixed(3)+'</span>':''}
    </p>`;
    if (e.community_id !== null && e.community_id !== undefined && e.community_id >= 0) {
      html += `<p style="font-size:11px;color:var(--amber)">社区 #${e.community_id} | 置信度: ${((e.community_confidence||1)*100).toFixed(0)}%</p>`;
    }
    if (e.is_bridge) html += '<p><span class="badge badge-bridge">桥接节点</span> score: '+(e.bridge_score||0).toFixed(3)+'</p>';

    if (conns.length) {
      html += '<p style="margin-top:8px;font-weight:600">Connections:</p>';
      conns.forEach(c => {
        html += `<div style="margin:2px 0;font-size:11px">
          → ${esc(c.target_name||c.target_entity_id||'?')}
          <span style="color:var(--text-muted)">intensity:${(c.intensity||0).toFixed(1)} valence:${(c.valence||0).toFixed(2)}</span>
        </div>`;
      });
    }
    panel.innerHTML = html;
    panel.classList.add('open');
  } catch (e) { console.error(e); }
}

      <div style="display:flex;justify-content:space-between;align-items:center">

          <button onclick="suggestSkillUpgrade('${esc(s.skill_name||s.id)}')" title="AI 升级建议" style="background:none;border:1px solid var(--border);color:var(--cyan);padding:2px 6px;border-radius:6px;cursor:pointer;font-size:10px">AI建议</button>
        </div>
      </div>
      <div class="mastery-bar" style="margin-top:6px">
        ${levels.map((l,i) => `<div class="dot${i<=idx?' active':''}" data-level="${l}" title="${l}" onclick="setMastery('${s.id}','${l}')"></div>`).join('')}
      </div>
      <div id="suggest-${esc(s.id||s.skill_name)}"></div>
    </div>`;
  });
  html += `<button onclick="suggestSkillUpgrade('')" style="margin-top:8px;padding:8px 16px;border-radius:10px;border:1px solid var(--accent);background:var(--bg-card);color:var(--accent);cursor:pointer;font-size:12px;width:100%;transition:all 0.15s">分析全部技能</button>`;
  div.innerHTML = html;
}

async function suggestSkillUpgrade(skillName) {
  const targetId = skillName ? `suggest-${skillName}` : null;
  if (targetId) {
    const el = document.getElementById(targetId);
    if (el) el.innerHTML = '<span class="spinner"></span> <span style="font-size:11px;color:var(--text-muted)">AI 分析中...</span>';
  }
  try {
    const resp = await fetch(API+'/api/skills/suggest', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({skill_name: skillName}),
    }).then(r=>r.json());
    if (resp.suggestions && resp.suggestions.length > 0) {
      resp.suggestions.forEach(sug => {
        const el = document.getElementById(`suggest-${sug.skill_name}`);
        if (el) {
          el.innerHTML = `<div style="margin-top:6px;padding:6px 8px;background:#06b6d611;border-radius:8px;font-size:11px">
            建议升级到 <b>${esc(sug.suggested_level)}</b> (置信度 ${Math.round((sug.confidence||0)*100)}%)
            <br><span style="color:var(--text-muted)">${esc(sug.reason||'')}</span>
          </div>`;
        }
      });
      if (!skillName) {
        resp.suggestions.forEach(sug => {
          for (const sk of (state.skills||[])) {
            if (sk.skill_name === sug.skill_name) {
              const el = document.getElementById(`suggest-${sk.id||sk.skill_name}`);
              if (el && !el.innerHTML.includes('建议升级到')) {
                el.innerHTML = `<div style="margin-top:6px;padding:6px 8px;background:#06b6d611;border-radius:8px;font-size:11px">
                  建议升级到 <b>${esc(sug.suggested_level)}</b> (置信度 ${Math.round((sug.confidence||0)*100)}%)
                  <br><span style="color:var(--text-muted)">${esc(sug.reason||'')}</span>
                </div>`;
              }
              break;
            }
          }
        });
      }
    } else if (resp.error) {
      if (targetId) {
        const el = document.getElementById(targetId);
        if (el) el.innerHTML = `<span style="font-size:11px;color:var(--red)">Error: ${esc(resp.error)}</span>`;
      }
    }
  } catch(e) {
    if (targetId) {
      const el = document.getElementById(targetId);
      if (el) el.innerHTML = '';
    }
  }
}

async function setMastery(id, level) {
  try {
    await fetch(API+'/api/skills/'+id+'/mastery', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({mastery_level: level}),

    const resp = await fetch(API+'/api/skills').then(r=>r.json());
    state.skills = resp.skills || [];
    renderSkills();
  } catch (e) { console.error(e); }
}

function renderRingGraph() {
  const svg = document.getElementById('ring-svg');
  if (!svg || !_ringData) return;

  const nodes = _ringData.nodes || [];
  const edges = _ringData.edges || [];
  const container = svg.parentElement;
  const W = container.clientWidth || 900;
  const H = container.clientHeight || 700;

  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
  svg.innerHTML = '';

  if (!nodes.length) {
    svg.innerHTML = `<text x="${W/2}" y="${H/2}" text-anchor="middle" fill="#9d9db5" font-size="14">你的知识环还是空的，聊聊天它就会开始生长</text>`;
    return;
  }

  const colorMap = {
    concept: '#6c5ce7', content: '#2dd4a0', person: '#f6b83d',
    event: '#f06565', artifact: '#9b8cf0',
  };

  const maxNodes = Math.min(nodes.length, 600);
  const visible = nodes.slice(0, maxNodes);
  visible.forEach(n => {
    n.r = 5 + (n.confidence || 0.5) * 9;
    n.label = (n.name || '').length > 10 ? (n.name || '').slice(0, 9) + '...' : (n.name || '');
    n.color = colorMap[n.type] || '#6e6e85';
  });

  // Sort by confidence: higher → inner rings
  visible.sort((a, b) => (b.confidence || 0) - (a.confidence || 0));

  const cx = W / 2, cy = H / 2;
  const maxR = Math.min(W, H) * 0.42;

  // Place nodes in 4 concentric rings
  const rings = [[], [], [], []];
  visible.forEach((n, i) => {
    if (i < visible.length * 0.15) rings[0].push(n);
    else if (i < visible.length * 0.40) rings[1].push(n);
    else if (i < visible.length * 0.70) rings[2].push(n);
    else rings[3].push(n);
  });

  const ringRadii = [maxR * 0.18, maxR * 0.38, maxR * 0.58, maxR * 0.78];
  rings.forEach((ring, ri) => {
    ring.forEach((n, i) => {
      const angle = (2 * Math.PI * i) / ring.length - Math.PI / 2;
      const r = ringRadii[ri] + (Math.random() - 0.5) * 20;
      n.x = cx + r * Math.cos(angle);
      n.y = cy + r * Math.sin(angle);
      n.vx = 0; n.vy = 0;
    });
  });

  const neighborMap = new Map();
  visible.forEach(n => neighborMap.set(n.entity_id, new Set()));
  edges.forEach(e => {
    const sa = neighborMap.get(e.source_id);
    const ta = neighborMap.get(e.target_id);
    if (sa) sa.add(e.target_id);
    if (ta) ta.add(e.source_id);
  });

  const nodeIdx = new Map();
  visible.forEach(n => nodeIdx.set(n.entity_id, n));

  const iterations = 120;
  const alpha0 = 1.0;
  for (let iter = 0; iter < iterations; iter++) {
    const alpha = alpha0 * (1 - iter / iterations);
    const alpha2 = alpha * alpha;

    for (let i = 0; i < visible.length; i++) {
      for (let j = i + 1; j < visible.length; j++) {
        const a = visible[i], b = visible[j];
        let dx = b.x - a.x, dy = b.y - a.y;
        let dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 1) { dist = 1; dx = 1; dy = 0; }
        const minDist = a.r + b.r + 8;
        const force = (600 * alpha2) / (dist * dist);
        const fx = (dx / dist) * force;
        const fy = (dy / dist) * force;
        a.vx -= fx; a.vy -= fy;
        b.vx += fx; b.vy += fy;
      }
    }

    edges.forEach(e => {
      const s = nodeIdx.get(e.source_id);
      const t = nodeIdx.get(e.target_id);
      if (!s || !t) return;
      let dx = t.x - s.x, dy = t.y - s.y;
      let dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 1) { dist = 1; dx = 1; dy = 0; }
      const rest = (s.r + t.r) * 2.5 + 30;
      const force = (dist - rest) * 0.03 * alpha;
      const fx = (dx / dist) * force;
      const fy = (dy / dist) * force;
      s.vx += fx; s.vy += fy;
      t.vx -= fx; t.vy -= fy;
    });

    visible.forEach(n => {
      const gx = (cx - n.x) * 0.002;
      const gy = (cy - n.y) * 0.002;
      n.vx += gx; n.vy += gy;
    });

    visible.forEach(n => {
      n.vx *= 0.45;
      n.vy *= 0.45;
      n.x += n.vx;
      n.y += n.vy;
    });

    for (let i = 0; i < visible.length; i++) {
      for (let j = i + 1; j < visible.length; j++) {
        const a = visible[i], b = visible[j];
        const dx = b.x - a.x, dy = b.y - a.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const minDist = a.r + b.r + 6;
        if (dist < minDist && dist > 0.01) {
          const overlap = minDist - dist;
          const fx = (dx / dist) * overlap * 0.5;
          const fy = (dy / dist) * overlap * 0.5;
          a.x -= fx; a.y -= fy;
          b.x += fx; b.y += fy;
        }
      }
    }

    visible.forEach(n => {
      n.x = Math.max(n.r, Math.min(W - n.r, n.x));
      n.y = Math.max(n.r, Math.min(H - n.r, n.y));
    });
  }

  const edgeGroup = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  edgeGroup.setAttribute('id', 'ring-edge-group');
  edges.forEach(e => {
    const s = nodeIdx.get(e.source_id);
    const t = nodeIdx.get(e.target_id);
    if (!s || !t) return;
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', s.x); line.setAttribute('y1', s.y);
    line.setAttribute('x2', t.x); line.setAttribute('y2', t.y);
    const dashMap = {belongs_to:'4,2', contains:'4,2', causes:'none', produces:'none', inspired_by:'6,3', knows:'2,2'};
    line.setAttribute('stroke', '#3d3d50');
    line.setAttribute('stroke-width', Math.max(0.5, (e.confidence||0.5)*2));
    line.setAttribute('stroke-dasharray', dashMap[e.type]||'3,3');
    line.setAttribute('opacity', '0.35');
    line.style.cursor = 'pointer';
    line.onclick = () => alert(`关系: ${e.source_name} -> ${e.target_name}\n类型: ${e.type}\n置信度: ${(e.confidence||0).toFixed(2)}`);
    edgeGroup.appendChild(line);
  });
  svg.appendChild(edgeGroup);

  const nodeGroup = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  nodeGroup.setAttribute('id', 'ring-node-group');
  visible.forEach(n => {
    const color = n.color || '#6e6e85';
    const size = n.r;

    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    g.setAttribute('transform', `translate(${n.x},${n.y})`);
    g.style.cursor = 'pointer';
    g.setAttribute('data-eid', n.entity_id);

    const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    circle.setAttribute('r', size);
    circle.setAttribute('fill', color);
    circle.setAttribute('opacity', '0.88');
    circle.setAttribute('stroke', '#0f0f13');
    circle.setAttribute('stroke-width', '1.2');
    g.appendChild(circle);

    // Label for medium+ nodes only
    if (size > 7) {
      const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      text.setAttribute('y', size + 10);
      text.setAttribute('text-anchor', 'middle');
      text.setAttribute('fill', '#9d9db5');
      text.setAttribute('font-size', '9');
      text.setAttribute('font-family', 'sans-serif');
      text.textContent = n.label;
      g.appendChild(text);
    }

    g.onmouseenter = () => {
      circle.setAttribute('stroke', '#fff');
      circle.setAttribute('stroke-width', '2.5');
    };
    g.onmouseleave = () => {
      circle.setAttribute('stroke', '#0f0f13');
      circle.setAttribute('stroke-width', '1.2');
    };
    g.onclick = () => showRingEntityDetail(n.entity_id);

    nodeGroup.appendChild(g);
  });
  svg.appendChild(nodeGroup);

  let zoomLevel = 1, panX = 0, panY = 0;
  const updateTransform = () => {
    nodeGroup.setAttribute('transform', `translate(${panX},${panY}) scale(${zoomLevel})`);
    edgeGroup.setAttribute('transform', `translate(${panX},${panY}) scale(${zoomLevel})`);
  };

  svg.onwheel = (e) => {
    e.preventDefault();
    const oldZoom = zoomLevel;
    zoomLevel *= e.deltaY < 0 ? 1.12 : 0.88;
    zoomLevel = Math.max(0.15, Math.min(4, zoomLevel));
    const rect = svg.getBoundingClientRect();
    const mx = e.clientX - rect.left, my = e.clientY - rect.top;
    panX = mx - (mx - panX) * (zoomLevel / oldZoom);
    panY = my - (my - panY) * (zoomLevel / oldZoom);
    updateTransform();
  };

  let dragging = false, dragX = 0, dragY = 0;
  svg.onmousedown = (e) => {
    if (e.target === svg) {
      dragging = true;
      dragX = e.clientX - panX;
      dragY = e.clientY - panY;
      svg.style.cursor = 'grabbing';
    }
  };
  svg.onmousemove = (e) => {
    if (dragging) {
      panX = e.clientX - dragX;
      panY = e.clientY - dragY;
      updateTransform();
    }
  };
  svg.onmouseup = () => { dragging = false; svg.style.cursor = 'default'; };
  svg.onmouseleave = () => { dragging = false; svg.style.cursor = 'default'; };

  svg.setAttribute('tabindex', '0');
  svg.onkeydown = (e) => {
    const step = 40;
    if (e.key === 'ArrowLeft') panX -= step;
    else if (e.key === 'ArrowRight') panX += step;
    else if (e.key === 'ArrowUp') panY -= step;
    else if (e.key === 'ArrowDown') panY += step;
    else if (e.key === '0') { zoomLevel = 1; panX = 0; panY = 0; }
    else return;
    e.preventDefault();
    updateTransform();
  };
}

  if (!panel || !content) return;
  panel.classList.remove('hidden');
  content.innerHTML = '<div class="spinner"></div>';
  switch (mode) {
    case 'entity': loadEntityInPanel(data); break;
    case 'persona': loadPersonaInPanel(); break;
    case 'reconnect': loadReconnectInPanel(); break;
    case 'daily': loadDailyInPanel(); break;
  }
}

function closeKnowledgePanel() {
  const panel = document.getElementById('knowledge-panel');
  if (panel) panel.classList.add('hidden');
}

async function loadEntityInPanel(entityId) {
  const content = document.getElementById('kp-content');
  try {
    const resp = await fetch(API+'/api/v1/entity/'+entityId).then(r=>r.json());
    const e = resp.entity || {};
    const aliases = resp.aliases || [];
    const relations = resp.relations || [];
    const colorMap = {concept:'#6c5ce7',content:'#2dd4a0',person:'#f6b83d',event:'#f06565',artifact:'#9b8cf0'};

    content.innerHTML = `
      <div style="margin-bottom:12px">
        <h3 style="display:flex;align-items:center;gap:8px;margin:0 0 4px">
          <span style="display:inline-block;width:12px;height:12px;border-radius:50%;background:${colorMap[e.type]||'#6e6e85'}"></span>
          ${esc(e.name||e.entity_id)}
        </h3>
        <p style="font-size:11px;color:var(--text-muted);margin:0">${esc(e.type||'')}${e.type_detail ? ' · '+esc(e.type_detail) : ''} · 置信度 ${(e.confidence||0).toFixed(2)}</p>
      </div>
      ${aliases.length ? `<div style="margin-bottom:10px"><b style="font-size:11px;color:var(--text-weak)">别名</b><div style="font-size:12px;margin-top:2px">${aliases.map(a=>esc(a.name)).join(', ')}</div></div>` : ''}
      ${relations.length ? `<div style="margin-bottom:10px"><b style="font-size:11px;color:var(--text-weak)">关系 (${relations.length})</b>
        ${relations.slice(0, 10).map(r=>`<div style="font-size:12px;margin:3px 0;padding:4px 8px;background:var(--bg-card);border-radius:6px;color:var(--text-muted)">${esc(r.type||'related')} → ${esc(r.source_name===e.name?r.target_name:r.source_name)}</div>`).join('')}
      </div>` : ''}
      <div style="margin-bottom:10px">
        <b style="font-size:11px;color:var(--text-weak)">纠错</b>
        <div class="correction-form" style="margin-top:6px">
          <textarea id="kp-correction-text" placeholder="描述需要纠正的内容，如：类型应为 person、领域应为 机器学习" rows="2" style="width:100%;padding:8px;border-radius:8px;border:1px solid var(--border);background:var(--bg-card);color:var(--text);font-size:12px;resize:none;font-family:inherit"></textarea>
          <div style="display:flex;gap:6px;margin-top:6px;justify-content:flex-end">
            <button onclick="submitPanelCorrection('${entityId}')" style="padding:5px 12px;border-radius:6px;border:none;background:var(--accent);color:#fff;cursor:pointer;font-size:11px">提交纠错</button>
          </div>
          <div id="kp-correction-status" style="font-size:11px;margin-top:4px"></div>
        </div>
      </div>`;
  } catch(e) {
    content.innerHTML = '<p style="color:var(--text-muted);font-size:12px">加载实体详情失败</p>';
  }
}

async function submitPanelCorrection(entityId) {
  const textarea = document.getElementById('kp-correction-text');
  const status = document.getElementById('kp-correction-status');
  const correction = textarea ? textarea.value.trim() : '';
  if (!correction) return;
  try {
    const resp = await fetch(API+'/api/v1/entity/'+entityId+'/correct', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({correction})
    }).then(r=>r.json());
    status.textContent = '已记录纠错';
    status.style.color = 'var(--green)';
    if (textarea) textarea.value = '';
    setTimeout(() => { status.textContent = ''; }, 2000);
  } catch(e) {
    status.textContent = '纠错失败';
    status.style.color = 'var(--red)';
  }
}

function loadPersonaInPanel() {
  const content = document.getElementById('kp-content');
  const layers = state.persona.layers || [];
  if (!layers.length) {
    content.innerHTML = '<p style="color:var(--text-muted);font-size:12px">Persona 尚未建立</p>';
    return;
  }
  let html = '<h4 style="margin:0 0 8px">Persona 四层边界</h4>';
  layers.forEach(l => {
    html += `<div style="margin-bottom:8px;padding:8px;background:var(--bg-card);border-radius:8px;border-left:3px solid ${l.immune?'var(--red)':'var(--accent)'}">
      <div style="font-size:11px;color:var(--text-muted)">${l.icon} ${l.label}${l.immune?' [免疫]':''}</div>
      <div style="font-size:12px;white-space:pre-wrap;color:var(--text)">${esc((l.content||'').substring(0, 500))}</div>
    </div>`;
  });
  content.innerHTML = html;
}

function loadReconnectInPanel() {
  const content = document.getElementById('kp-content');
  const recs = state.reconnect || [];
  if (!recs.length) {
    content.innerHTML = '<p style="color:var(--text-muted);font-size:12px">暂无社交重连建议</p>';
    return;
  }
  let html = '<h4 style="margin:0 0 8px">社交重连</h4>';
  recs.forEach(r => {
    html += `<div style="margin-bottom:8px;padding:10px;background:linear-gradient(135deg,#1e1a50,#16161e);border:1px solid #4c3fd9;border-radius:10px">
      <div style="font-weight:700;color:var(--amber);font-size:13px">${esc(r.name||r.entity_name||'')}</div>
      <div style="font-size:11px;color:var(--text-muted);margin:4px 0">${esc(r.detail||r.message||'')}</div>
      ${r.days_inactive ? `<div style="font-size:10px;color:var(--text-weak)">${r.days_inactive}天未互动</div>` : ''}
    </div>`;
  });
  content.innerHTML = html;
}

function loadDailyInPanel() {
  const content = document.getElementById('kp-content');
  content.innerHTML = '<div class="spinner"></div>';
  fetch(API+'/api/v1/daily-report').then(r=>r.json()).then(daily => {
    let html = '<h4 style="margin:0 0 8px">今日报告</h4>';
    if (daily.streak) html += `<div style="font-size:14px;color:var(--amber);margin-bottom:8px">连续活跃 ${daily.streak} 天</div>`;
    if (daily.totals) html += `<div style="display:flex;gap:16px;margin-bottom:8px"><div style="text-align:center"><div style="font-size:20px;font-weight:700;color:var(--accent)">${daily.totals.entities||0}</div><div style="font-size:10px;color:var(--text-weak)">实体</div></div><div style="text-align:center"><div style="font-size:20px;font-weight:700;color:var(--green)">${daily.totals.relations||0}</div><div style="font-size:10px;color:var(--text-weak)">关系</div></div><div style="text-align:center"><div style="font-size:20px;font-weight:700;color:var(--accent-purple)">${daily.totals.domains||0}</div><div style="font-size:10px;color:var(--text-weak)">领域</div></div></div>`;
    if (daily.domain_growth && daily.domain_growth.length) {
      html += '<div style="font-size:11px;color:var(--text-muted)">领域增长</div>';
      daily.domain_growth.slice(0,5).forEach(d => {
        html += `<div style="font-size:12px;margin:2px 0">${esc(d.domain)} +${d.count}</div>`;
      });
    }
    content.innerHTML = html;
  }).catch(() => {
    content.innerHTML = '<p style="color:var(--text-muted);font-size:12px">加载日报失败</p>';
  });
}

function filterRingGraph() {
  loadPersonalGraph();
}

async function refreshPersonalGraph() {
  loadPersonalGraph();
}

// =========================================================================
// Helpers
// =========================================================================
function esc(s) {
  if (!s) return '';
  s = String(s);
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function renderBar(val) {
  const pct = Math.round((val||0)*100);
  const color = pct > 60 ? 'var(--green)' : pct > 30 ? 'var(--amber)' : 'var(--red)';
  return `<span style="color:${color}">${'|'.repeat(Math.round(pct/10))}${'·'.repeat(10-Math.round(pct/10))} ${pct}%</span>`;
}

async function captureSnapshot() {
  try {
    const resp = await fetch(API+'/api/persona/snapshot', { method: 'POST' }).then(r=>r.json());
    alert(`快照已捕获\n时间: ${new Date(resp.timestamp*1000).toLocaleString('zh-CN')}\n核心价值条目: ${resp.core_value_count}`);
  } catch(e) {
    console.error('Snapshot failed:', e);
  }
}

async function loadSessionMemories() {
  const div = document.getElementById('session-memories');
  if (!div) return;
  try {
    const resp = await fetch(API+'/api/memories/session?limit=20').then(r=>r.json());
    const edges = resp.edges || [];
    if (!edges.length) {
      div.innerHTML = '<div class="empty-state" style="padding:12px"><p style="font-size:12px">开始对话后，本次会话提取的记忆会显示在这里</p></div>';
      return;
    }
    let html = '';
    edges.slice(0, 12).forEach(e => {
      const emo = (e.emotion||0) > 0.3 ? ':-)' : (e.emotion||0) < -0.3 ? ':-(' : ':-|';
      html += `<div style="padding:4px 0;border-bottom:1px solid var(--border);font-size:11px;cursor:pointer" onclick="showEntityDetail('${e.entity_id}')">
        ${emo} <b>${esc(e.entity_name||'?')}</b>
        <span class="badge badge-${e.entity_type||'concept'}" style="margin-left:4px;font-size:10px">${e.entity_type||'?'}</span>
        <span style="color:var(--text-muted);margin-left:4px">${e.role||''}</span>
      </div>`;
    });
    div.innerHTML = html;
  } catch(e) {
    console.error('Session memories error:', e);
  }
}

async function buildKnowledgeCardForLastReply() {
  try {
    const resp = await fetch(API+'/api/memories/session?limit=20').then(r=>r.json());
    const edges = resp.edges || [];
    if (!edges.length) return;
    // Find the last assistant message
    const allMsgs = document.querySelectorAll('.chat-msg.assistant');
    const lastMsg = allMsgs[allMsgs.length - 1];
    if (!lastMsg) return;
    // Remove existing knowledge card if any
    const existing = lastMsg.querySelector('.knowledge-card');
    if (existing) existing.remove();
    // Aggregate entities by type
    const entities = {};
    edges.forEach(e => {
      const key = e.entity_name || '?';
      const type = e.entity_type || 'concept';
      if (!entities[key]) entities[key] = { name: key, type, count: 0 };
      entities[key].count++;
    });
    const entityList = Object.values(entities).slice(0, 8);
    const typeCounts = {};
    entityList.forEach(e => { typeCounts[e.type] = (typeCounts[e.type]||0) + 1; });
    // Build card
    let card = document.createElement('div');
    card.className = 'knowledge-card collapsed';
    card.innerHTML = `
      <div class="kc-header" onclick="this.parentElement.classList.toggle('collapsed')">
        <span class="kc-icon">🧠</span>
        <span class="kc-title">知识提取 (${entityList.length}实体 · ${edges.length}条记忆)</span>
        <span class="kc-toggle">▼</span>
      </div>
      <div class="kc-body">
        <div class="kc-row">
          <span class="kc-label">实体</span>
          <span class="kc-value">+${entityList.length}</span>
          <span class="kc-items">
            ${entityList.map(e => `<span class="kc-entity ${e.type}" onclick="event.stopPropagation();openKnowledgePanel('entity','${e.name}')">${esc(e.name)}</span>`).join('')}
          </span>
        </div>
        <div class="kc-row">
          <span class="kc-label">类型分布</span>
          <span class="kc-items">
            ${Object.entries(typeCounts).map(([t,c]) => `<span class="kc-entity ${t}">${t} ×${c}</span>`).join('')}
          </span>
        </div>
        <div class="kc-actions">
          <button class="kc-btn" onclick="event.stopPropagation();switchToView('ring')">知识环中查看</button>
        </div>
      </div>`;
    lastMsg.appendChild(card);
    // Auto-expand for 3 seconds then collapse
    setTimeout(() => { card.classList.add('collapsed'); }, 5000);
    // Remove collapsed to show initially
    card.classList.remove('collapsed');
    setTimeout(() => { card.classList.add('collapsed'); }, 4000);
  } catch(e) { console.error('Knowledge card error:', e); }
}

async function openFileBrowser() {
  document.getElementById('file-modal-title').textContent = '文件浏览器';
  const body = document.getElementById('file-modal-body');
  body.innerHTML = '<div class="spinner"></div> 加载中...';
  document.getElementById('file-modal').classList.add('open');

  try {
    const [filesResp, dbResp] = await Promise.all([
      fetch(API+'/api/files').then(r=>r.json()),
      fetch(API+'/api/db/tables').then(r=>r.json()),
    ]);
    const files = filesResp.files || [];
    const tables = dbResp.tables || [];

    let html = '<div style="margin-bottom:12px;font-weight:600">文件</div><div class="file-list">';
    files.forEach(f => {
      html += `<div class="file-item" onclick="viewFile('${f.key}')">
        <div class="fi-name">${f.description}</div>
        <div class="fi-meta">${f.name}${f.exists ? ' · ' + formatSize(f.size) : ' (不存在)'}</div>
      </div>`;
    });
    html += '</div>';

    html += `<div style="margin:16px 0 8px;font-weight:600">数据库 <span style="font-size:10px;color:var(--text-muted)">${dbResp.db_path||''} · ${formatSize(dbResp.db_size||0)}</span></div>`;
    html += '<table class="data-table"><tr><th>表名</th><th>行数</th></tr>';
    tables.forEach(t => {
      html += `<tr><td>${esc(t.table)}</td><td>${(t.rows||0).toLocaleString()}</td></tr>`;
    });
    html += '</table>';

    body.innerHTML = html;
  } catch(e) {
    body.innerHTML = `<span style="color:var(--red)">加载失败: ${e}</span>`;
  }
}

async function viewFile(key) {
  const body = document.getElementById('file-modal-body');
  body.innerHTML = '<div class="spinner"></div> 加载中...';
  try {
    const resp = await fetch(API+'/api/files/'+key).then(r=>r.json());
    document.getElementById('file-modal-title').textContent = '文件: ' + resp.name;
    body.innerHTML = `<div style="margin-bottom:8px;font-size:11px;color:var(--text-muted)">${esc(resp.path)} · ${resp.size} 字符</div>
      <button onclick="openFileBrowser()" style="margin-bottom:8px;padding:4px 10px;border-radius:8px;border:1px solid var(--border);background:var(--bg-card);color:var(--text);cursor:pointer;font-size:11px">返回列表</button>
      <pre>${esc(resp.content)}</pre>`;
  } catch(e) {
    body.innerHTML = `<span style="color:var(--red)">读取失败: ${e}</span>
      <br><button onclick="openFileBrowser()" style="margin-top:8px;padding:4px 10px;border-radius:8px;border:1px solid var(--border);background:var(--bg-card);color:var(--text);cursor:pointer;font-size:11px">返回列表</button>`;
  }
}

function closeFileBrowser() {
  document.getElementById('file-modal').classList.remove('open');
}

async function openResourceMonitor() {
  try {
    const resp = await fetch(API+'/api/system/resources').then(r=>r.json());
    const b = resp.budget;
    const s = resp.storage;
    const c = resp.counts;
    const deg = resp.degradation || [];

    const degLabels = {
      dynamic_embedding_cache_disabled: '动态图嵌入缓存已关闭',
      knowledge_index_trimmed: '知识索引已裁剪',
      group_render_fallback_list_only: '分组渲染降级为列表模式',
    };

    let html = `<div class="modal-overlay" onclick="this.remove()" style="display:flex">
      <div class="modal-box" style="max-width:480px">
        <h3>双舱资源监控</h3>
        <h4>热舱预算 (${b.high_performance_mode?'高性能 125MB':'标准 100MB'})</h4>
        <div style="background:var(--bg-deep);border-radius:8px;padding:8px;margin:4px 0">
          <div style="display:flex;justify-content:space-between;font-size:12px">
            <span>已用: ${b.used_mb} MB</span><span>剩余: ${b.remaining_mb} MB</span><span>${b.usage_pct}%</span>
          </div>
          <div class="track" style="width:100%"><div class="fill" style="width:${Math.min(b.usage_pct,100)}%;background:${b.usage_pct>80?'var(--red)':b.usage_pct>60?'var(--amber)':'var(--accent)'}"></div></div>
        </div>
        <h4>存储</h4>
        <table class="data-table" style="font-size:10px"><tr><th>组件</th><th>大小</th></tr>
          <tr><td>SQLite 数据</td><td>${s.db_mb} MB</td></tr>
          <tr><td>WAL 日志</td><td>${s.wal_mb} MB</td></tr>
          <tr><td>总计</td><td>${s.total_db_mb} MB</td></tr>
        </table>
        <h4>计数</h4>
        <table class="data-table" style="font-size:10px"><tr><th>表</th><th>行数</th></tr>
          <tr><td>实体</td><td>${c.entities}</td></tr>
          <tr><td>记忆边</td><td>${c.memory_edges}</td></tr>
          <tr><td>社交边</td><td>${c.social_edges}</td></tr>
          <tr><td>知识条目</td><td>${c.knowledge_entries}</td></tr>
        </table>`;

    if (deg.length) {
      html += `<h4 style="color:var(--red)">降级状态</h4>`;
      deg.forEach(d => { html += `<p style="font-size:11px;color:var(--red)">- ${degLabels[d]||d}</p>`; });
    }

    html += `<p style="font-size:10px;color:var(--text-muted);margin-top:8px">Python ${resp.python_version} | ${resp.generated_at}</p>
      <button onclick="this.closest('.modal-overlay').remove()" style="padding:6px 14px;border-radius:8px;border:1px solid var(--border);background:var(--bg-card);color:var(--text);cursor:pointer;font-size:12px">关闭</button></div></div>`;

    document.body.insertAdjacentHTML('beforeend', html);
  } catch(e) { console.error(e); }
}

function formatSize(bytes) {
  if (!bytes || bytes < 1024) return (bytes||0) + ' B';
  if (bytes < 1048576) return (bytes/1024).toFixed(1) + ' KB';
  return (bytes/1048576).toFixed(1) + ' MB';
}
